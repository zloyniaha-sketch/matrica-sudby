name: Deploy GitHub Pages (backup, без оплаты)

# Основной сайт с оплатой — Vercel. Этот workflow только вручную, без API-роутов не соберётся.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      SITE_DOMAIN: ${{ vars.CUSTOM_DOMAIN || 'yourdestiny.tech' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build static site (no payment API)
        run: |
          rm -rf src/app/api
          npm run build
        env:
          NEXT_PUBLIC_STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://${{ env.SITE_DOMAIN }}

      - name: Add CNAME for custom domain
        run: echo "${{ env.SITE_DOMAIN }}" > out/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
